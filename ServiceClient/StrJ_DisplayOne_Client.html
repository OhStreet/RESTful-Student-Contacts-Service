<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>StrJ Display One Client</title>
</head>
<body>
    <h3>Select One Record</h3>

    <form id="target">
        Contact ID:
        <input type="text" id="contact_id" name="contact_id">
        <input type="submit" value="Select Record">
    </form>

    <br>
    <p>
        Message Contents:<br>
        <span id="aMessage"></span>
    </p>

    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.7.2/jquery.min.js" type="text/javascript"></script>

    <script>
    $('#target').submit(function(event) {
        event.preventDefault();

        var aContactID = $('#contact_id').val();

        $.ajax({
            type: 'GET',
            url: 'http://localhost:8080/CIS266/RESTful/StrJ_Unit2_Ex3/ServiceProvider/StrJ_DisplayOne_API.php',
            data: 'contact_id=' + aContactID,
            dataType: 'json',
            encode: true
        })
        .done(function(data) {
            var output = "";

            if (data.error) {
                output = data.error;
            } else if (data.message) {
                output = data.message;
            } else {
                output =
                    data.contact_id + " " +
                    data.first_name + " " +
                    data.last_name + " " +
                    data.email + " " +
                    (data.phone ?? "") + " " +
                    (data.major ?? "") + " " +
                    (data.grad_year ?? "") + " " +
                    data.created_at;
            }

            $('#aMessage').html(output);
        })
        .fail(function() {
            $('#aMessage').text('An error occurred. Please try again.');
        });
    });
    </script>
</body>
</html>
